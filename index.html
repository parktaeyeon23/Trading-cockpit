<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<title>Trend Following Cockpit v2</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
  // Force classic JSX runtime (React.createElement) — automatic runtime emits
  // bare `import` statements that fail in a non-module <script>.
  Babel.registerPreset('classic-react', {
    presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
  });
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0c; --bg2: #121218; --bg3: #1b1b24; --bg4: #24242f;
    --text: #e6e6ee; --text2: #9a9aae; --text3: #62626f;
    --amber: #ffb000; --amber-bg: rgba(255,176,0,0.12);
    --green: #00d68f; --green-bg: rgba(0,214,143,0.12);
    --red: #ff4d4d; --red-bg: rgba(255,77,77,0.12);
    --blue: #4a8cff; --blue-bg: rgba(74,140,255,0.12);
    --border: rgba(255,255,255,0.08);
    --mono: 'SFMono-Regular', ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
    --radius: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: env(safe-area-inset-top) 0 calc(64px + env(safe-area-inset-bottom)) 0;
    font-size: 14px; line-height: 1.45;
  }
  .container { max-width: 640px; margin: 0 auto; padding: 14px 14px 0; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 2px 12px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
  }
  .brand { font-size: 15px; font-weight: 700; letter-spacing: .04em; }
  .brand .dot { color: var(--amber); }
  .brand small { color: var(--text3); font-weight: 500; font-size: 11px; letter-spacing: .12em; }
  .phasepill {
    font-family: var(--mono); font-size: 11px; padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg2); cursor: pointer; color: var(--text2);
  }
  .phasepill b { color: var(--text); }

  /* tabs */
  .tabs {
    position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2);
    border-top: 1px solid var(--border); display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    flex: 1; padding: 9px 4px 8px; text-align: center; font-size: 10.5px; letter-spacing: .02em;
    color: var(--text3); background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px; font-weight: 600;
  }
  .tab.active { color: var(--amber); }
  .tab .ic { font-size: 17px; line-height: 1; }

  /* generic */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .card h2 { font-size: 13px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .card h2 .num { font-family: var(--mono); color: var(--amber); }
  .muted { color: var(--text2); }
  .dim { color: var(--text3); }
  .mono { font-family: var(--mono); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  label.field { display: block; margin-bottom: 10px; }
  label.field .lab { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  input.inp, select.inp {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-family: var(--mono); font-size: 14px;
  }
  input.inp:focus, select.inp:focus { outline: none; border-color: var(--amber); }
  select.inp { font-family: inherit; }

  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button { background: none; border: none; color: var(--text2); padding: 6px 12px; font-size: 12px; cursor: pointer; font-weight: 600; }
  .seg button.on { background: var(--amber-bg); color: var(--amber); }

  .check { display: flex; align-items: flex-start; gap: 9px; padding: 8px 6px; border-radius: 8px; cursor: pointer; }
  .check:hover { background: var(--bg3); }
  .check .box {
    width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--text3);
    flex: 0 0 18px; margin-top: 1px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--bg); font-weight: 800;
  }
  .check.on .box { background: var(--green); border-color: var(--green); }
  .check.on.req .box { background: var(--amber); border-color: var(--amber); }
  .check .txt { font-size: 13px; }
  .check .src { font-size: 10.5px; color: var(--text3); margin-top: 1px; }
  .check .auto { font-family: var(--mono); font-size: 11px; padding: 1px 6px; border-radius: 5px; margin-left: auto; flex: 0 0 auto; }
  .auto.pass { background: var(--green-bg); color: var(--green); }
  .auto.fail { background: var(--red-bg); color: var(--red); }
  .auto.warn { background: var(--amber-bg); color: var(--amber); }
  .auto.na { background: var(--bg3); color: var(--text3); }

  .chip { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); }
  .chip.g { background: var(--green-bg); color: var(--green); border-color: transparent; }
  .chip.r { background: var(--red-bg); color: var(--red); border-color: transparent; }
  .chip.a { background: var(--amber-bg); color: var(--amber); border-color: transparent; }
  .chip.b { background: var(--blue-bg); color: var(--blue); border-color: transparent; }

  .gradewrap { display: flex; align-items: center; gap: 16px; }
  .badge {
    font-family: var(--mono); font-weight: 800; font-size: 40px; line-height: 1;
    width: 96px; height: 96px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    border: 2px solid; letter-spacing: -.02em;
  }
  .badge.Ap, .badge.A { color: var(--green); border-color: var(--green); background: var(--green-bg); }
  .badge.Bp, .badge.B { color: var(--amber); border-color: var(--amber); background: var(--amber-bg); }
  .badge.C { color: var(--red); border-color: var(--red); background: var(--red-bg); }
  .gradeinfo { flex: 1; }
  .gradeinfo .lead { font-size: 13px; font-weight: 700; margin-bottom: 6px; }

  .why { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .miss { list-style: none; margin-top: 8px; }
  .miss li { display: flex; gap: 8px; padding: 5px 0; font-size: 12.5px; border-top: 1px solid var(--border); }
  .miss li .mk { color: var(--red); font-weight: 800; flex: 0 0 auto; }
  .miss li .mk.w { color: var(--amber); }

  .meter { height: 7px; background: var(--bg3); border-radius: 999px; overflow: hidden; margin-top: 6px; }
  .meter > span { display: block; height: 100%; border-radius: 999px; background: var(--amber); }

  /* sector board */
  .phasegrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .phasebtn { background: var(--bg); border: 1px solid var(--border); color: var(--text2); padding: 9px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; line-height: 1.3; text-align: left; }
  .phasebtn.on { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .phasebtn small { display: block; color: var(--text3); font-weight: 500; font-size: 10px; }
  .phasebtn.on small { color: var(--amber); opacity: .8; }
  .heatgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .cell { position: relative; border: 1.5px solid var(--border); border-radius: 9px; padding: 8px 7px 7px; cursor: pointer; background: var(--bg3); text-align: left; min-height: 64px; }
  .cell.sel { box-shadow: 0 0 0 2px var(--amber); }
  .cell .sym { font-family: var(--mono); font-weight: 700; font-size: 13px; }
  .cell .nm { font-size: 10px; color: var(--text2); }
  .cell .rsbadge { position: absolute; top: 6px; right: 6px; font-family: var(--mono); font-size: 10px; font-weight: 800; width: 16px; height: 16px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: var(--bg); }
  .cell .heatbar { height: 4px; border-radius: 999px; background: var(--bg); margin-top: 7px; overflow: hidden; position: relative; }
  .cell .heatbar > span { display: block; height: 100%; border-radius: 999px; }
  .cell .heatbar .dl { position: absolute; top: -1px; bottom: -1px; width: 1px; background: var(--text2); }
  .cell .oh { position: absolute; bottom: 5px; right: 6px; font-size: 11px; }
  /* alignment lamps (F2-3) */
  .lamps { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; align-items: stretch; }
  .lamp { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 6px; text-align: center; position: relative; }
  .lampdot { width: 34px; height: 34px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; }
  .lamp .lt { font-size: 12px; font-weight: 700; }
  .lamp .ls { font-size: 10px; color: var(--text3); margin-top: 2px; line-height: 1.3; }
  .lampsep { display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 18px; }
  .lampg { background: var(--green-bg); color: var(--green); border: 2px solid var(--green); }
  .lampa { background: var(--amber-bg); color: var(--amber); border: 2px solid var(--amber); }
  .lampr { background: var(--red-bg); color: var(--red); border: 2px solid var(--red); }
  .lampn { background: var(--bg3); color: var(--text3); border: 2px solid var(--text3); }
  .placeholder { text-align: center; padding: 40px 20px; color: var(--text3); }
  .placeholder .big { font-size: 32px; margin-bottom: 12px; }
  .placeholder .ms { font-family: var(--mono); color: var(--amber); font-size: 12px; margin-top: 10px; }

  .tip { position: relative; cursor: help; border-bottom: 1px dotted var(--text3); }
  details.acc { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; }
  details.acc summary { cursor: pointer; font-size: 12px; color: var(--text2); list-style: none; }
  details.acc summary::-webkit-details-marker { display: none; }
  .bench { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  a.link { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="classic-react">
const { useState, useMemo, createContext, useContext } = React;

/* ───────────────────────── Jeff Sun rule sources (부록 A) ───────────────────────── */
const SRC = {
  vwap:    "Ch4~5 · 주가>VWAP (DT M5 / Swing M5+D1)",
  earn:    "Ch6 · 어닝 룰 (2주 내 실적 발표 금지)",
  trend:   "Ch4~5 · M5 추세선 이격 (clear of trendlines)",
  clean:   "Ch4~5 · D1 차트 품질 (갭·변동성 캔들 없는 깨끗한 추세)",
  index:   "Ch4~5 · 지수(SPY) 추세 정렬",
  ema9:    "Ch2 · 가격은 D9EMA의 8% 이내",
  adr:     "Ch2 · ADR% > 3.5% (변동성 충분)",
  ext:     "Ch2 · 200-MA에서 3×ADR% 이상 이격 시 경고",
  comp:    "Ch4~5 · D1 Compression Break (거래량 동반 좁은 레인지 돌파)",
  ath:     "Ch4~5 · ATH (D1 사상 최고가)",
  event:   "Ch4~5 · D1 Event (알고라인→수평 S/R→SMA 돌파)",
  ha:      "Ch4~5 · HA Continuation (3번째 연속 HA FB 캔들)",
  vcp:     "보조 · VCP / Cup&Handle 패턴",
  rvol:    "Ch2 · RVOL — Volume Buzz +20% 최소, +180% 가산",
  adrdist: "Ch2 · Top100 winner 통계: ADR% 2%+ 96%, 3%+ 89%",
  rs:      "Ch4~5 · 섹터 대비 RS 우위 (D1 5일 RS) — F2 연동",
  void:    "Ch2 · D1 Void > 1%",
  base:    "Ch2 · 타이트 베이스 + 거래량 수축 후 돌파 급증",
};

/* ───────────────────────── Scoring engine (F1) ───────────────────────── */
// pure function — testable, interpretable. returns full breakdown.
function scoreSetup(s, env = {}) {
  const phase = env.phase || "Confirmed Uptrend";
  const linked = env.linked || null; // 연동 섹터 시그널 {trend,rs,heat} 또는 null
  const num = (v) => (v === "" || v == null || isNaN(parseFloat(v)) ? null : parseFloat(v));
  const price = num(s.price), vwap = num(s.vwap), ema9 = num(s.ema9),
        adr = num(s.adr), ma200 = num(s.ma200), rvol = num(s.rvol), voidPct = num(s.voidPct);

  // ── Mandatory (F1-1): every item must pass; any fail caps grade at B
  const mand = [];
  const ema9Dist = price != null && ema9 != null ? Math.abs(price - ema9) / ema9 * 100 : null;
  const extPct = price != null && ma200 != null ? (price - ma200) / ma200 * 100 : null;
  const extLimit = adr != null ? 3 * adr : null;

  mand.push({ key: "vwap", label: "주가 > VWAP", src: SRC.vwap,
    state: price != null && vwap != null ? (price > vwap ? "pass" : "fail") : (s.m_vwap ? "pass" : "na"),
    auto: price != null && vwap != null ? (price > vwap ? "Δ+" + (price - vwap).toFixed(2) : "Δ" + (price - vwap).toFixed(2)) : null });
  mand.push({ key: "earn", label: "2주 이내 실적 발표 없음", src: SRC.earn, state: s.m_earn ? "pass" : "fail" });
  mand.push({ key: "trend", label: "M5 추세선에서 이격", src: SRC.trend, state: s.m_trend ? "pass" : "fail" });
  mand.push({ key: "clean", label: "D1 차트 품질 양호 (갭·변동성 無)", src: SRC.clean, state: s.m_clean ? "pass" : "fail" });
  mand.push({ key: "index", label: "지수(SPY) 추세에 정렬", src: SRC.index, state: s.m_index ? "pass" : "fail" });
  mand.push({ key: "ema9", label: "가격 D9EMA의 8% 이내", src: SRC.ema9,
    state: ema9Dist != null ? (ema9Dist <= 8 ? "pass" : "fail") : "na",
    auto: ema9Dist != null ? ema9Dist.toFixed(1) + "%" : null });
  mand.push({ key: "adr", label: "ADR% > 3.5%", src: SRC.adr,
    state: adr != null ? (adr > 3.5 ? "pass" : "fail") : "na",
    auto: adr != null ? adr.toFixed(2) + "%" : null });

  // 200-MA extension = WARNING (not a hard mandatory fail)
  const extWarn = extPct != null && extLimit != null && extPct >= extLimit;
  const extItem = { key: "ext", label: "200-MA 이격 < 3×ADR%", src: SRC.ext,
    state: extPct != null && extLimit != null ? (extWarn ? "warn" : "pass") : "na",
    auto: extPct != null ? extPct.toFixed(1) + "% / lim " + (extLimit != null ? extLimit.toFixed(1) + "%" : "—") : null,
    warnOnly: true };

  const mandFails = mand.filter(m => m.state === "fail");
  const mandNA = mand.filter(m => m.state === "na");
  const mandatoryPass = mandFails.length === 0;

  // ── Triggers (F1-2): need ≥1
  const TRIGS = [
    { key: "comp", label: "D1 Compression Break", src: SRC.comp },
    { key: "ath", label: "ATH (D1 사상 최고가)", src: SRC.ath },
    { key: "event", label: "D1 Event (algo→S/R→SMA)", src: SRC.event },
    { key: "ha", label: "HA Continuation (3rd FB)", src: SRC.ha },
    { key: "vcp", label: "VCP / Cup&Handle (보조)", src: SRC.vcp, aux: true },
  ];
  const trigsOn = TRIGS.filter(t => s["t_" + t.key]);
  const hasTrigger = trigsOn.length >= 1;

  // ── Quality (F1-3): additive, interpretable points
  let q = 0; const qChips = [];
  // RVOL tiers
  if (rvol != null) {
    if (rvol >= 2.8) { q += 2; qChips.push({ t: "RVOL " + rvol.toFixed(1) + "× (+180% buzz)", c: "g" }); }
    else if (rvol >= 1.2) { q += 1; qChips.push({ t: "RVOL " + rvol.toFixed(1) + "× (+20% buzz)", c: "g" }); }
    else { qChips.push({ t: "RVOL " + rvol.toFixed(1) + "× <1.2", c: "r" }); }
  }
  // ADR% distribution benchmark
  if (adr != null) {
    if (adr >= 3) qChips.push({ t: "ADR% " + adr.toFixed(1) + " · Top100 상위 89%", c: "b" });
    else if (adr >= 2) qChips.push({ t: "ADR% " + adr.toFixed(1) + " · Top100 상위 96%", c: "b" });
  }
  // Sector RS — F2 연동: 섹터가 연결되어 RS가 설정돼 있으면 자동 사용, 아니면 수동 폴백
  const rsLinked = !!(linked && linked.rs && linked.rs !== "neutral");
  const effRs = rsLinked ? linked.rs : s.q_rs;
  if (effRs === "strong") { q += 1; qChips.push({ t: "섹터 RS 강함" + (rsLinked ? " (연동)" : ""), c: "g" }); }
  else if (effRs === "weak") { qChips.push({ t: "섹터 RS 약함" + (rsLinked ? " (연동)" : ""), c: "r" }); }
  // D1 Void > 1%
  if (voidPct != null && voidPct > 1) { q += 1; qChips.push({ t: "D1 Void " + voidPct.toFixed(1) + "%", c: "g" }); }
  // Tight base + volume contraction→surge
  if (s.q_base) { q += 1; qChips.push({ t: "타이트 베이스 + 거래량 수축→돌파", c: "g" }); }

  const qMax = 5;

  // ── Grade resolution
  let grade, lead;
  if (!hasTrigger) {
    grade = "C"; lead = "셋업 트리거 없음 — 진입 자격 미달";
  } else if (!mandatoryPass) {
    grade = q >= 2 ? "B" : "C";
    lead = "필수 기준 미충족 — 등급 B로 캡(cap)";
  } else {
    if (q >= 5) grade = "Ap";
    else if (q >= 3) grade = "A";
    else if (q >= 1) grade = "Bp";
    else grade = "B";
    lead = "필수 통과 · 트리거 " + trigsOn.length + "개 · 품질 " + q + "/" + qMax;
  }

  // ── F2-3 정렬 신호 + 섹터 페널티
  const ORDER = ["Ap", "A", "Bp", "B", "C"];
  const marketBull = phase === "Confirmed Uptrend" || phase === "Uptrend Under Pressure";
  let sectorPenalty = null;
  // 시장은 상승인데 섹터가 50SMA 아래(붕괴) → 종목 등급 1단계 하향
  if (linked && linked.trend === "down" && marketBull) {
    grade = ORDER[Math.min(ORDER.indexOf(grade) + 1, ORDER.length - 1)];
    sectorPenalty = { txt: "섹터 50SMA 아래(붕괴) + 시장 상승 → 등급 −1단계", c: "r" };
  }
  const sectorOverheat = linked ? isOverheated(linked) : false;

  // 3단 신호등 상태 (g/a/r/n)
  const marketState = phase === "Confirmed Uptrend" ? "g" : phase === "Downtrend" ? "r" : "a";
  const sectorState = !linked ? "n" : linked.trend === "up" ? "g" : linked.trend === "pull" ? "a" : linked.trend === "down" ? "r" : "n";
  const stockState = grade === "Ap" || grade === "A" ? "g" : grade === "C" ? "r" : "a";
  const aligned = marketState === "g" && sectorState === "g" && stockState === "g";

  // why-chips (multiplicative rationale, ties into F3 later)
  const why = [];
  why.push({ t: "필수 " + (mand.length - mandFails.length) + "/" + mand.length, c: mandatoryPass ? "g" : "r" });
  why.push({ t: "트리거 " + trigsOn.length, c: hasTrigger ? "g" : "r" });
  why.push({ t: "품질 " + q + "/" + qMax, c: q >= 3 ? "g" : q >= 1 ? "a" : "r" });
  if (extWarn) why.push({ t: "⚠ 200-MA 과확장", c: "r" });
  if (sectorPenalty) why.push({ t: "▼ 섹터 −1", c: "r" });
  if (sectorOverheat) why.push({ t: "🔥 섹터 과열", c: "a" });

  return { grade, lead, mand, extItem, mandFails, mandNA, mandatoryPass,
           TRIGS, trigsOn, hasTrigger, qChips, q, qMax, why, extWarn,
           phase, linked, marketBull, sectorPenalty, sectorOverheat,
           marketState, sectorState, stockState, aligned, rsLinked };
}

const GRADE_LABEL = { Ap: "A+", A: "A", Bp: "B+", B: "B", C: "C" };

/* ───────────────────────── 3-Stop Strategy engine (F1-4) ───────────────────────── */
// Day0 3등분 스탑 → 합산 손실 -0.67R 캡. entry/stop 필수, ATR%는 트레일링용.
function threeStop(s) {
  const num = (v) => (v === "" || v == null || isNaN(parseFloat(v)) ? null : parseFloat(v));
  const entry = num(s.entry) != null ? num(s.entry) : num(s.price);
  const stop = num(s.stop);
  const atr = num(s.atr);
  if (entry == null || stop == null || !(entry > stop)) return { ok: false, entry, stop };
  const risk = entry - stop;                 // 1R in price terms
  const Rpct = risk / entry * 100;
  const t2 = entry + 2 * risk;               // +2R target (33% 분할 익절)
  const trail8 = atr != null ? entry * (1 + 8 * atr / 100) : null;
  const trail10 = atr != null ? entry * (1 + 10 * atr / 100) : null;
  // 3등분: 세 번째 진입분의 스탑을 본전 위로 끌어올려 합산 최악 손실을 -0.67R로 제한.
  // 보수적 모델: tranche A,B는 -1R, tranche C는 본전(+0R) → 평균 (-1-1+0)/3 = -0.67R
  const legs = [
    { name: "A (1/3)", stopR: -1, note: "초기 스탑 유지" },
    { name: "B (1/3)", stopR: -1, note: "초기 스탑 유지" },
    { name: "C (1/3)", stopR: 0, note: "본전까지 스탑 상향" },
  ];
  const combinedR = legs.reduce((a, l) => a + l.stopR, 0) / 3; // -0.67
  const maxPrice = Math.max(t2, trail10 || 0);
  const minPrice = stop;
  const pos = (p) => maxPrice > minPrice ? ((p - minPrice) / (maxPrice - minPrice)) * 100 : 0;
  return { ok: true, entry, stop, risk, Rpct, t2, atr, trail8, trail10, legs, combinedR, pos };
}

const DEFAULT_SIG = { trend: "neutral", rs: "neutral", heat: "", vol: "" };
const HEAT_LIMIT = 5; // 5×ATR% = 과열 임계 (Jeff Sun Ch16)

function sectorScore(sig) {
  let s = 0;
  s += sig.trend === "up" ? 2 : sig.trend === "pull" ? 1 : sig.trend === "down" ? -3 : 0;
  s += sig.rs === "strong" ? 2 : sig.rs === "weak" ? -1 : 0;
  if (isOverheated(sig)) s -= 2;
  return s;
}
function isOverheated(sig) { const h = parseFloat(sig.heat); return !isNaN(h) && h >= HEAT_LIMIT; }
function sigIsSet(sig) { return sig.trend !== "neutral" || sig.rs !== "neutral" || sig.heat !== ""; }

/* ───────────────────────── Shared state context ───────────────────────── */
const Cockpit = createContext(null);

/* ───────────────────────── Reusable bits ───────────────────────── */
function Field({ label, src, children }) {
  return (
    <label className="field">
      <span className="lab">{label}{src && <span className="dim" title={src}>ⓘ</span>}</span>
      {children}
    </label>
  );
}
function Num({ v, set, ph }) {
  return <input className="inp" inputMode="decimal" placeholder={ph || "—"} value={v}
    onChange={e => set(e.target.value)} />;
}
function Check({ on, set, label, src, req, auto }) {
  return (
    <div className={"check" + (on ? " on" : "") + (req ? " req" : "")} onClick={() => set(!on)}>
      <span className="box">{on ? "✓" : ""}</span>
      <span style={{ flex: 1 }}>
        <span className="txt">{label}</span>
        {src && <span className="src">{src}</span>}
      </span>
      {auto && <span className={"auto " + auto.cls}>{auto.txt}</span>}
    </div>
  );
}

const BLANK = {

function autoChip(state, txt) {
  if (!txt) return null;
  const cls = state === "pass" ? "pass" : state === "fail" ? "fail" : state === "warn" ? "warn" : "na";
  return { cls, txt };
}

/* ───────────────────────── Dynamic sizing engine (F3) ───────────────────────── */
const GRADE_MULT = { Ap: 1.0, A: 0.8, Bp: 0.65, B: 0.5, C: 0 };
const PHASE_BASE = {
  "Confirmed Uptrend":      { lo: 0.75, hi: 1.25, mid: 1.0, label: "강한 상승장" },
  "Rally Attempt":          { lo: 0.5,  hi: 1.0,  mid: 0.75, label: "상승 시도" },
  "Uptrend Under Pressure": { lo: 0.25, hi: 0.5,  mid: 0.4, label: "상승 압박" },
  "Downtrend":              { lo: 0,    hi: 0,    mid: 0,   label: "하락장 (보류)" },
};
const HEAT_CAP_SOFT = 8, HEAT_CAP_HARD = 10; // 포트폴리오 히트 캡 6~10%
const R_OPTIONS = [0.25, 0.5, 0.75, 1.0, 1.25];

function sectorMult(linked) {
  if (!linked || linked.name === "미선택") return { m: 0.8, why: "섹터 미연동" };
  if (linked.trend === "down") return { m: 0.5, why: "섹터 50SMA 아래" };
  if (linked.rs === "strong") return { m: 1.0, why: "섹터 RS 강함" };
  if (linked.rs === "weak") return { m: 0.65, why: "섹터 RS 약함" };
  return { m: 0.8, why: "섹터 중립" };
}

function sizeIt(inp) {
  const num = (v) => (v === "" || v == null || isNaN(parseFloat(v)) ? null : parseFloat(v));
  const { phase, grade, linked, eventNear } = inp;
  const account = num(inp.account), riskPct = num(inp.riskPct), entry = num(inp.entry), stop = num(inp.stop), atr = num(inp.atr);
  const base = PHASE_BASE[phase] || PHASE_BASE["Confirmed Uptrend"];
  const gradeMult = GRADE_MULT[grade] != null ? GRADE_MULT[grade] : 0;
  const sm = sectorMult(linked);
  const overheat = !!(linked && isOverheated(linked));
  const overheatMult = overheat ? 0.5 : 1;
  let stopATR = null, stopMult = 1;
  if (entry != null && stop != null && atr != null && entry > stop && atr > 0) {
    stopATR = (entry - stop) / (entry * atr / 100);
    if (stopATR >= 3.5) stopMult = 0.7; else if (stopATR >= 2.5) stopMult = 0.85;
  }
  const eventMult = eventNear ? 0.5 : 1;
  const rawR = base.mid * gradeMult * sm.m * overheatMult * stopMult * eventMult;
  const finalR = Math.max(0, Math.min(rawR, base.hi));

  let riskUnit = null, actualRisk = null, perShare = null, shares = null, position = null, posPct = null, maxLoss = null;
  const ready = account != null && riskPct != null && entry != null && stop != null && entry > stop && finalR > 0;
  if (ready) {
    riskUnit = account * riskPct / 100;     // 1R in money
    actualRisk = riskUnit * finalR;
    perShare = entry - stop;
    shares = Math.floor(actualRisk / perShare);
    position = shares * entry;
    posPct = account > 0 ? position / account * 100 : 0;
    maxLoss = shares * perShare;
  }
  const blocked = grade === "C" ? "C등급 — 신규 진입 보류" : base.mid === 0 ? "하락장 — 신규 진입 보류 / 현금" : null;

  const why = [
    { t: base.label + " (base " + base.mid + "R)", c: "b" },
    { t: "등급 " + (GRADE_LABEL[grade] || grade) + " ×" + gradeMult, c: gradeMult >= 0.8 ? "g" : gradeMult > 0 ? "a" : "r" },
    { t: sm.why + " ×" + sm.m, c: sm.m >= 1 ? "g" : sm.m >= 0.8 ? "a" : "r" },
  ];
  if (overheat) why.push({ t: "🔥 과열 ×0.5", c: "r" });
  if (stopMult < 1) why.push({ t: "넓은 스탑 " + stopATR.toFixed(1) + "×ATR ×" + stopMult, c: "a" });
  if (eventNear) why.push({ t: "이벤트 임박 ×0.5", c: "r" });

  return { base, gradeMult, sm, overheat, stopATR, stopMult, eventMult, finalR, rawR,
           riskUnit, actualRisk, perShare, shares, position, posPct, maxLoss, ready, blocked, why,
           account, entry, riskPct };
}

function PositionSizer() {
  const { phase, activeSector, grade, plan, updatePlan } = useContext(Cockpit);
  const [ccy, setCcy] = useState("USD");
  const [account, setAccount] = useState("");
  const [riskPct, setRiskPct] = useState("1.0");
  const [rate, setRate] = useState("1380");
  const [openHeat, setOpenHeat] = useState("");
  const [eventNear, setEventNear] = useState(false);

  const sLabel = activeSector.name + (activeSector.rs && activeSector.rs !== "neutral" ? " · RS " + RS_META[activeSector.rs].lab : "") + (isOverheated(activeSector) ? " · 🔥" : "");
  const z = useMemo(() => sizeIt({ phase, grade, linked: activeSector, eventNear, account, riskPct, entry: plan.entry, stop: plan.stop, atr: plan.atr }),
    [phase, grade, activeSector, eventNear, account, riskPct, plan.entry, plan.stop, plan.atr]);

  const rateN = parseFloat(rate) || 0;
  const other = ccy === "USD" ? "KRW" : "USD";
  const conv = (v) => v == null || !rateN ? null : (ccy === "USD" ? v * rateN : v / rateN);
  const fmt = (v, c = ccy) => v == null ? "—" : (c === "KRW" ? "₩" + Math.round(v).toLocaleString() : "$" + v.toLocaleString(undefined, { maximumFractionDigits: 2 }));
  const fmtBoth = (v) => v == null ? "—" : fmt(v) + " · " + fmt(conv(v), other);

  const recOpt = R_OPTIONS.reduce((b, o) => Math.abs(o - z.finalR) < Math.abs(b - z.finalR) ? o : b, R_OPTIONS[0]);

/* ───────────────────────── App shell ───────────────────────── */
const PHASES = ["Confirmed Uptrend", "Uptrend Under Pressure", "Rally Attempt", "Downtrend"];

/* ── 클라우드 동기화 (기존 거래일지 GAS 재사용) — 크로스 디바이스 공유 ──
   ⚠ 공개 페이지에 노출됨(거래일지와 동일 수준). 민감 데이터 금지.
   서버측에 saveCockpit/loadCockpit 액션을 추가하고 GAS를 재배포해야 활성화됨. */
const SYNC_URL = "https://script.google.com/macros/s/AKfycbzdlXIgdDcgp8lnIZPSBucSjR2ZeaBshVnRuMYBw37AsNhEjkn-YiVawHnl72r-8Of_/exec";
const SYNC_SECRET = "alpha-desk-2026-mypw";

function cloudSaveBoard(payload, onDone) {
  try {
    let iframe = document.getElementById("cockpit-sync-iframe");
    if (!iframe) {
      iframe = document.createElement("iframe");
      iframe.id = "cockpit-sync-iframe"; iframe.name = "cockpit-sync-iframe";
      iframe.style.display = "none"; document.body.appendChild(iframe);
    }
    const form = document.createElement("form");
    form.method = "POST";
    form.action = SYNC_URL + "?secret=" + encodeURIComponent(SYNC_SECRET);
    form.target = "cockpit-sync-iframe";
    const add = (n, v) => { const i = document.createElement("input"); i.type = "hidden"; i.name = n; i.value = v; form.appendChild(i); };
    add("action", "saveCockpit");
    add("cockpit", JSON.stringify(payload));
    document.body.appendChild(form);
    let done = false; const finish = (ok) => { if (done) return; done = true; try { document.body.removeChild(form); } catch (e) {} if (onDone) onDone(ok); };
    const handler = () => { iframe.removeEventListener("load", handler); finish(true); };
    iframe.addEventListener("load", handler);
    form.submit();
    setTimeout(() => finish(true), 5000);
  } catch (e) { if (onDone) onDone(false); }
}

function cloudLoadBoard(onData) {
  try {
    const cb = "cockpitLoadCb_" + Date.now();
    let settled = false; const settle = (r) => { if (settled) return; settled = true; try { delete window[cb]; } catch (e) {} const s = document.getElementById("cockpit-load-script"); if (s) s.remove(); onData(r); };
    window[cb] = (resp) => settle(resp);
    const old = document.getElementById("cockpit-load-script"); if (old) old.remove();
    const script = document.createElement("script");
    script.id = "cockpit-load-script";
    script.src = SYNC_URL + "?action=loadCockpit&callback=" + cb + "&t=" + Date.now();
    script.onerror = () => settle(null);
    document.body.appendChild(script);
    setTimeout(() => settle(null), 9000);
  } catch (e) { onData(null); }
}

/* localStorage 영속화 — Market 탭 입력(국면·섹터 시그널 등) 유지 + 마지막 저장 시각 기록 (오프라인 캐시) */
const STORAGE_KEY = "tf-cockpit-v2";
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch (e) { return {}; }
}
function fmtSaved(iso) {
  if (!iso) return "저장 안 됨";
  const d = new Date(iso); const p = (n) => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate()) + " " + p(d.getHours()) + ":" + p(d.getMinutes());
}
function agoLabel(iso) {
  if (!iso) return "";
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000), hr = Math.floor(min / 60), day = Math.floor(hr / 24);
  if (day >= 1) return day + "일 전";
  if (hr >= 1) return hr + "시간 전";
  if (min >= 1) return min + "분 전";
  return "방금 전";
}

function App() {
  const saved = useMemo(loadSaved, []);
  const g = (k, d) => (saved[k] !== undefined && saved[k] !== null ? saved[k] : d);

  const [active, setActive] = useState("scorer");
  const [phase, setPhase] = useState(g("phase", "Confirmed Uptrend"));
  const [grade, setGrade] = useState("C");
  // sector board state (lifted so it persists across tabs · localStorage 영속화)
  const [boardMarket, setBoardMarket] = useState(g("boardMarket", "US"));
  const [weighting, setWeighting] = useState(g("weighting", "cap"));
  const [sigs, setSigs] = useState(g("sigs", {}));
  const [activeKey, setActiveKey] = useState(g("activeKey", null));
  const [savedAt, setSavedAt] = useState(g("savedAt", null));
  const [syncStatus, setSyncStatus] = useState("idle"); // idle|loading|saving|synced|offline
  const updateSig = (k, p) => setSigs(prev => ({ ...prev, [k]: { ...DEFAULT_SIG, ...prev[k], ...p } }));

  const firstRun = React.useRef(true);
  const skipRemote = React.useRef(false);
  const saveTimer = React.useRef(null);

  // 원격(클라우드) 데이터를 상태에 반영 — push 루프 방지를 위해 skipRemote 가드
  const applyRemote = (d, cloudAt) => {
    skipRemote.current = true;
    if (d.phase) setPhase(d.phase);
    if (d.boardMarket) setBoardMarket(d.boardMarket);
    if (d.weighting) setWeighting(d.weighting);
    setSigs(d.sigs || {});
    setActiveKey(d.activeKey != null ? d.activeKey : null);
    setSavedAt(cloudAt || null);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ phase: d.phase, boardMarket: d.boardMarket, weighting: d.weighting, sigs: d.sigs || {}, activeKey: d.activeKey, savedAt: cloudAt })); } catch (e) {}
    setSyncStatus("synced");
  };

  // 자동 저장: 변경 시 localStorage(오프라인 캐시) + 디바운스 클라우드 푸시 + 저장 시각 갱신
  React.useEffect(() => {
    if (firstRun.current) { firstRun.current = false; return; }
    if (skipRemote.current) { skipRemote.current = false; return; }
    const now = new Date().toISOString();
    const payload = { phase, boardMarket, weighting, sigs, activeKey, savedAt: now };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch (e) {}
    setSavedAt(now);
    setSyncStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => cloudSaveBoard(payload, (ok) => setSyncStatus(ok ? "synced" : "offline")), 1200);
  }, [phase, boardMarket, weighting, sigs, activeKey]);

  // 마운트 시 클라우드 최신본 가져와 병합 (타임스탬프 최신 우선)
  React.useEffect(() => {
    setSyncStatus("loading");
    const localAt = saved.savedAt || null;
    cloudLoadBoard((resp) => {
      if (!resp || !resp.success) { setSyncStatus("offline"); return; }
      const cloudAt = resp.updatedAt || null;
      if (resp.data && (!localAt || (cloudAt && cloudAt > localAt))) {
        applyRemote(resp.data, cloudAt);            // 클라우드 최신 → 반영
      } else if (localAt && (!cloudAt || localAt > cloudAt)) {
        cloudSaveBoard({ phase, boardMarket, weighting, sigs, activeKey, savedAt: localAt }, (ok) => setSyncStatus(ok ? "synced" : "offline")); // 로컬 최신 → 푸시
      } else {
        setSyncStatus("synced");
      }
    });
  }, []);

  // 수동 동기화: 클라우드 최신본 강제로 가져오기
  const pullCloud = () => {
    setSyncStatus("loading");
    cloudLoadBoard((resp) => {
      if (resp && resp.success && resp.data) applyRemote(resp.data, resp.updatedAt || null);
      else setSyncStatus(resp ? "synced" : "offline");
    });
  };

  const resetBoard = () => {
    setSigs({}); setActiveKey(null);
    setPhase("Confirmed Uptrend"); setBoardMarket("US"); setWeighting("cap");
  };
  // shared trade plan (entry/stop/atr) — used by Scorer 3-Stop & Position Sizer
  const [plan, setPlan] = useState({ entry: "", stop: "", atr: "" });
  const updatePlan = (p) => setPlan(prev => ({ ...prev, ...p }));

  const activeSector = useMemo(() => {
    if (!activeKey) return { name: "미선택", trend: "neutral", rs: "neutral", heat: "" };
    const meta = SECTOR_META.find(x => x.k === activeKey);
    const sig = sigs[activeKey] || DEFAULT_SIG;
    const sym = meta ? (boardMarket === "US" && weighting === "ew" && meta.ew ? meta.ew : meta.k.replace("KR_", "")) : activeKey;
    return { key: activeKey, name: (meta ? meta.name : activeKey), sym, ...sig };
  }, [activeKey, sigs, weighting, boardMarket]);

  const cyclePhase = () => setPhase(p => PHASES[(PHASES.indexOf(p) + 1) % PHASES.length]);

  const TABS = [
    { k: "board", ic: "🗺️", t: "Market" },
    { k: "scorer", ic: "🎯", t: "Scorer" },
    { k: "sizer", ic: "📐", t: "Sizer" },
    { k: "ref", ic: "📖", t: "Reference" },
  ];

  return (
    <Cockpit.Provider value={{ phase, setPhase, grade, setGrade,
      boardMarket, setBoardMarket, weighting, setWeighting, sigs, updateSig, activeKey, setActiveKey, activeSector,
      plan, updatePlan, savedAt, resetBoard, syncStatus, pullCloud }}>
      <div className="container">
        <div className="topbar">
          <div className="brand">TF COCKPIT<span className="dot">·</span>v2<br/><small>JEFF SUN · CFTe</small></div>
          <button className="phasepill" onClick={cyclePhase} title="탭하여 시장 국면 전환 (공유 상태)">
            시장 <b>{phase}</b> ▸
          </button>
        </div>

        {active === "board" && <MarketSector />}
        {active === "scorer" && <SetupScorer />}
        {active === "sizer" && <PositionSizer />}
        {active === "ref" && <Reference />}
      </div>

      <nav className="tabs">
        {TABS.map(t => (
          <button key={t.k} className={"tab" + (active === t.k ? " active" : "")} onClick={() => setActive(t.k)}>
            <span className="ic">{t.ic}</span>{t.t}
          </button>
        ))}
      </nav>
    </Cockpit.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
